<!doctype html>
<html lang="en" class="scroll-smooth">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/khode-logo.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#05bbd3" media="(prefers-color-scheme: light)" />
    <meta name="theme-color" content="#0a0f14" media="(prefers-color-scheme: dark)" />
    <meta
      name="description"
      content="KHode — Café · A code-inspired coffee house in Siem Reap, Cambodia. Specialty single-origin coffee, gigabit Wi‑Fi, and a calm space to build. ABA KHQR payments accepted."
    />
    <title>KHode — Café · Brew. Build. Belong.</title>

    <!-- Open Graph / social cards -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="KHode — Café" />
    <meta property="og:title" content="KHode — Café · Brew. Build. Belong." />
    <meta
      property="og:description"
      content="A code-inspired coffee house in Siem Reap. Specialty coffee, gigabit Wi‑Fi, and a space designed to help you focus. ABA KHQR accepted."
    />
    <meta property="og:url" content="https://khode-cafe.vercel.app/" />
    <meta property="og:image" content="https://khode-cafe.vercel.app/khode-logo.png" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="KHode — Café · Brew. Build. Belong." />
    <meta
      name="twitter:description"
      content="A code-inspired coffee house in Siem Reap. Specialty coffee, gigabit Wi‑Fi, ABA KHQR accepted."
    />
    <meta name="twitter:image" content="https://khode-cafe.vercel.app/khode-logo.png" />

    <!-- Fonts: Urbanist (EN) · Hanuman (KH) · Kiwi Maru (JA) -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <!-- Image CDN used for menu & gallery photography -->
    <link rel="preconnect" href="https://images.unsplash.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Hanuman:wght@400;700;900&family=Kiwi+Maru:wght@400;500&family=Urbanist:wght@400;500;600;700;800;900&display=swap"
      rel="stylesheet"
    />

    <!-- Prevent theme flash: apply stored/system theme before paint -->
    <script>
      (function () {
        try {
          var t = localStorage.getItem('khode-theme');
          var dark = t ? t === 'dark' : window.matchMedia('(prefers-color-scheme: dark)').matches;
          document.documentElement.classList.toggle('dark', dark);
        } catch (e) {}
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
