<!doctype html>
<html lang="en" class="scroll-smooth">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/khode-logo.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#05bbd3" />
    <meta
      name="description"
      content="KHode — Café · A code-inspired coffee house in Siem Reap. Specialty coffee, fast Wi‑Fi, and a calm space to build. ABA KHQR payments accepted."
    />
    <title>KHode — Café · Brew. Build. Belong.</title>

    <!-- Fonts: Urbanist (EN) + Hanuman (KH) -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Hanuman:wght@400;700;900&family=Kiwi+Maru:wght@400;500&family=Urbanist:wght@400;500;600;700;800;900&display=swap"
      rel="stylesheet"
    />

    <!-- Prevent theme flash: apply stored/system theme before paint -->
    <script>
      (function () {
        try {
          var t = localStorage.getItem('khode-theme');
          var dark = t ? t === 'dark' : window.matchMedia('(prefers-color-scheme: dark)').matches;
          document.documentElement.classList.toggle('dark', dark);
        } catch (e) {}
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
